<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Centres de vote</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>
html, body { height: 100%; margin: 0; font-family: Arial, sans-serif; }
#map { height: 100%; width: 100%; }

.panel{
  position: fixed;
  top: 0;
  left: 0;
  width: 330px;
  height: 100vh;
  background: white;
  z-index: 9999;
  box-shadow: 0 0 15px rgba(0,0,0,.2);
  overflow-y: auto;
}

.header{
  background: #009fe3;
  color: white;
  padding: 14px;
  font-weight: bold;
}

.body{ padding: 12px; }

label{
  font-size: 11px;
  font-weight: bold;
  display: block;
  margin-top: 10px;
}

input, select{
  width: 100%;
  padding: 8px;
  margin-top: 4px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

#comSelect{ height: 100px; }

button{
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: none;
  border-radius: 6px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.blue{ background:#009fe3; }
.dark{ background:#1c3d5a; }
.green{ background:#198754; }
.orange{ background:#b7791f; }
.violet{ background:#6d28d9; }

.preview-box{
  margin-top: 8px;
  border:1px solid #ddd;
  border-radius:8px;
  padding:6px;
}

.preview-box img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.map-legend{
  position: fixed;
  bottom: 20px;
  left: 350px;
  background: white;
  padding: 10px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,.2);
  font-size: 12px;
}

.north{
  position: fixed;
  top: 15px;
  right: 15px;
  background: white;
  padding: 8px;
  border-radius: 8px;
  text-align: center;
}

.north .arrow{
  width:0;height:0;
  margin:4px auto 0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-bottom:28px solid black;
}

/* correction menu fond de carte */
.leaflet-control-layers{
  font-size:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.leaflet-bottom.leaflet-right .leaflet-control-layers{
  margin-bottom:80px;
  margin-right:15px;
}
</style>
</head>
<body>

<div id="map"></div>

<div class="panel">
  <div class="header">Centres de vote</div>

  <div class="body">
    <label>Recherche</label>
    <input id="search">

    <label>Département</label>
    <select id="dep"></select>

    <label>Commune</label>
    <select id="com" multiple></select>

    <label>Section</label>
    <select id="sec"></select>

    <div style="margin-top:10px;font-weight:bold">
      <span id="count">0</span> centres
    </div>

    <button class="dark" id="reset">reset</button>
    <button class="blue" id="fit">ajuster</button>
    <button class="dark" id="sections">sections ON/OFF</button>
    <button class="green" id="labels">labels ON/OFF</button>
    <button class="violet" id="print">imprimer</button>
    <button class="blue" id="csv">export csv</button>

    <label>Aperçu</label>
    <div class="preview-box">
      <img id="preview">
    </div>
  </div>
</div>

<div class="map-legend">
  <b>Légende</b><br>
  ● centres<br>
  — sections
</div>

<div class="north">
  N
  <div class="arrow"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="data.js"></script>

<script>
const map = L.map("map").setView([18.95,-72.83],7);

const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
const carto = L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png");
const esri = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}");

L.control.layers(
  {"OSM":osm,"Carto":carto,"Satellite":esri},
  {},
  {position:"bottomright",collapsed:false}
).addTo(map);

const cluster = L.markerClusterGroup({chunkedLoading:true});
map.addLayer(cluster);

let sectionsLayer=null;
let sectionsOn=true;
let labelsOn=false;

function uniq(a){return [...new Set(a)];}

const dep=document.getElementById("dep");
const com=document.getElementById("com");
const sec=document.getElementById("sec");
const search=document.getElementById("search");
const count=document.getElementById("count");
const preview=document.getElementById("preview");

function fill(){
  dep.innerHTML='<option value="">tous</option>';
  uniq(pts.map(p=>p.dep)).forEach(v=>dep.innerHTML+=`<option>${v}</option>`);
}

function filter(){
  cluster.clearLayers();

  let data=pts.filter(p=>{
    if(dep.value && p.dep!==dep.value)return false;
    if(sec.value && p.sec!==sec.value)return false;
    if(search.value && !p.tip.toLowerCase().includes(search.value.toLowerCase()))return false;
    return true;
  });

  count.innerText=data.length;

  let bounds=[];

  data.forEach(p=>{
    let m=L.marker([p.lat,p.lon]).bindPopup(p.popup);

    if(labelsOn){
      m.bindTooltip(p.tip,{permanent:true});
    }

    cluster.addLayer(m);
    bounds.push([p.lat,p.lon]);
  });

  if(bounds.length)map.fitBounds(bounds);
}

async function previewUpdate(){
  const canvas=await html2canvas(document.getElementById("map"));
  preview.src=canvas.toDataURL();
}

async function printMap(){
  const canvas=await html2canvas(document.getElementById("map"),{scale:2});
  const img=canvas.toDataURL();

  const w=window.open();
  w.document.write(`<img src="${img}" style="width:100%">`);
  w.print();
}

async function loadSections(){
  const res=await fetch("sections_communales.geojson");
  const gj=await res.json();

  sectionsLayer=L.geoJSON(gj,{
    style:{color:"#1c3d5a",weight:1}
  }).addTo(map);
}

document.getElementById("reset").onclick=()=>{
  search.value="";
  dep.value="";
  sec.value="";
  filter();
};

document.getElementById("fit").onclick=filter;

document.getElementById("labels").onclick=()=>{
  labelsOn=!labelsOn;
  filter();
};

document.getElementById("sections").onclick=()=>{
  if(!sectionsLayer)return;
  if(sectionsOn){map.removeLayer(sectionsLayer);}
  else{map.addLayer(sectionsLayer);}
  sectionsOn=!sectionsOn;
};

document.getElementById("print").onclick=printMap;

document.getElementById("csv").onclick=()=>{
  let rows="dep,com,sec,nom,lat,lon\n";
  pts.forEach(p=>{
    rows+=`${p.dep},${p.com},${p.sec},${p.tip},${p.lat},${p.lon}\n`;
  });
  const blob=new Blob([rows]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="centres.csv";
  a.click();
};

search.oninput=filter;
dep.onchange=filter;
sec.onchange=filter;

map.on("moveend",previewUpdate);
map.on("zoomend",previewUpdate);

fill();
filter();
loadSections();
setTimeout(previewUpdate,1000);
</script>
</body>
</html>
