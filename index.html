<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Centres de vote</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>
html, body { height: 100%; margin: 0; font-family: Arial, sans-serif; }
#map { height: 100%; width: 100%; }

.panel{
  position: fixed;
  top: 0;
  left: 0;
  width: 340px;
  height: 100vh;
  background: #fff;
  z-index: 9999;
  box-shadow: 0 0 15px rgba(0,0,0,.15);
  overflow-y: auto;
}

.header{
  background: #009fe3;
  color: white;
  padding: 14px 16px;
  font-weight: bold;
  font-size: 20px;
}

.sub{
  font-size: 12px;
  font-weight: normal;
  margin-top: 4px;
}

.body{
  padding: 14px;
}

label{
  display: block;
  font-size: 11px;
  font-weight: bold;
  color: #666;
  margin: 12px 0 5px;
  text-transform: uppercase;
}

input, select, button{
  width: 100%;
  padding: 9px 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

#comSelect{
  height: 110px;
}

button{
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-top: 8px;
}

.btn-blue{ background:#009fe3; }
.btn-dark{ background:#1c3d5a; }
.btn-green{ background:#198754; }
.btn-orange{ background:#b7791f; }
.btn-violet{ background:#6d28d9; }

.preview-box{
  margin-top: 8px;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 8px;
  background: #fff;
}

.preview-box img{
  width: 100%;
  height: 170px;
  object-fit: cover;
  border-radius: 6px;
  background: #f3f4f6;
}

.stat{
  margin: 10px 0;
  font-size: 14px;
  font-weight: bold;
  color: #1c3d5a;
}

.map-legend{
  position: fixed;
  bottom: 20px;
  left: 355px;
  z-index: 9000;
  background: white;
  padding: 10px 12px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,.15);
  font-size: 12px;
}

.north{
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 9000;
  background: white;
  border-radius: 8px;
  padding: 8px;
  text-align: center;
  box-shadow: 0 0 10px rgba(0,0,0,.15);
  width: 52px;
}

.north .arrow{
  width: 0;
  height: 0;
  margin: 4px auto 0;
  border-left: 10px solid transparent;
  border-right: 10px solid transparent;
  border-bottom: 28px solid black;
}

.leaflet-tooltip.lbl{
  background: rgba(255,255,255,.95);
  border: 1px solid #ccc;
  border-radius: 4px;
  padding: 3px 6px;
  font-size: 11px;
  font-weight: bold;
}

@media print{
  .panel,
  .leaflet-control-container,
  .map-legend,
  .north{
    display:none !important;
  }
}
</style>
</head>
<body>

<div id="map"></div>

<div class="panel">
  <div class="header">
    centres de vote
    <div class="sub">visualisation, filtres et impression</div>
  </div>

  <div class="body">
    <label>recherche centre</label>
    <input type="text" id="searchInput" placeholder="nom du centre...">

    <label>département</label>
    <select id="depSelect">
      <option value="__ALL__">tous les départements</option>
    </select>

    <label>commune(s)</label>
    <select id="comSelect" multiple></select>

    <label>section communale</label>
    <select id="secSelect">
      <option value="__ALL__">toutes les sections</option>
    </select>

    <div class="stat"><span id="countBox">0</span> centres affichés</div>

    <button class="btn-dark" id="resetBtn">réinitialiser</button>
    <button class="btn-blue" id="fitBtn">ajuster carte</button>
    <button class="btn-dark" id="toggleSectionsBtn">masquer / afficher sections</button>
    <button class="btn-green" id="toggleLabelsBtn">afficher / masquer labels</button>
    <button class="btn-violet" id="printBtn">imprimer la vue actuelle</button>
    <button class="btn-blue" id="exportCsvBtn">export csv filtré</button>

    <label>aperçu impression</label>
    <div class="preview-box">
      <img id="printPreviewImg" alt="aperçu carte">
    </div>
  </div>
</div>

<div class="map-legend">
  <b>légende</b><br>
  ● centres de vote<br>
  — sections communales
</div>

<div class="north">
  <b>N</b>
  <div class="arrow"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="data.js"></script>

<script>
if (!Array.isArray(pts)) {
  alert("data.js ne s'est pas chargé correctement.");
  throw new Error("pts non chargé");
}

const map = L.map("map").setView([18.95, -72.83], 7);

const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: "&copy; OpenStreetMap"
}).addTo(map);

const carto = L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  maxZoom: 20,
  attribution: "&copy; Carto"
});

const esri = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
  maxZoom: 19,
  attribution: "Esri"
});

L.control.layers(
  { "OpenStreetMap": osm, "Carto light": carto, "Satellite": esri },
  {},
  { position: "topright" }
).addTo(map);

L.control.scale({ metric: true, imperial: false }).addTo(map);

const cluster = L.markerClusterGroup({
  chunkedLoading: true,
  chunkDelay: 50,
  chunkInterval: 200,
  disableClusteringAtZoom: 16
});
map.addLayer(cluster);

const depSelect = document.getElementById("depSelect");
const comSelect = document.getElementById("comSelect");
const secSelect = document.getElementById("secSelect");
const searchInput = document.getElementById("searchInput");
const countBox = document.getElementById("countBox");
const resetBtn = document.getElementById("resetBtn");
const fitBtn = document.getElementById("fitBtn");
const toggleSectionsBtn = document.getElementById("toggleSectionsBtn");
const toggleLabelsBtn = document.getElementById("toggleLabelsBtn");
const printBtn = document.getElementById("printBtn");
const exportCsvBtn = document.getElementById("exportCsvBtn");
const printPreviewImg = document.getElementById("printPreviewImg");

let sectionsLayer = null;
let sectionsVisible = true;
let forceLabels = false;

function uniq(arr){
  return [...new Set(arr.filter(Boolean))].sort((a,b)=>a.localeCompare(b,'fr',{sensitivity:'base'}));
}

function norm(v){
  return String(v || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .trim();
}

function selectedCommunes(){
  return Array.from(comSelect.selectedOptions).map(o => o.value);
}

function fillSelect(select, values, allText){
  select.innerHTML = "";
  if (allText){
    const o = document.createElement("option");
    o.value = "__ALL__";
    o.textContent = allText;
    select.appendChild(o);
  }
  values.forEach(v => {
    const o = document.createElement("option");
    o.value = v;
    o.textContent = v;
    select.appendChild(o);
  });
}

function getFilteredPoints(){
  const dep = depSelect.value === "__ALL__" ? "" : depSelect.value;
  const sec = secSelect.value === "__ALL__" ? "" : secSelect.value;
  const coms = selectedCommunes();
  const q = norm(searchInput.value);

  return pts.filter(p => {
    if (dep && p.dep !== dep) return false;
    if (coms.length && !coms.includes(p.com)) return false;
    if (sec && p.sec !== sec) return false;
    if (q){
      const txt = norm([p.tip, p.dep, p.com, p.sec, p.popup].join(" "));
      if (!txt.includes(q)) return false;
    }
    return true;
  });
}

function refreshFilters(){
  const dep = depSelect.value === "__ALL__" ? "" : depSelect.value;
  const currentComs = selectedCommunes();

  const coms = dep ? uniq(pts.filter(p => p.dep === dep).map(p => p.com)) : uniq(pts.map(p => p.com));
  fillSelect(comSelect, coms);

  Array.from(comSelect.options).forEach(o => {
    if (currentComs.includes(o.value)) o.selected = true;
  });

  const secCandidates = pts.filter(p => {
    if (dep && p.dep !== dep) return false;
    if (selectedCommunes().length && !selectedCommunes().includes(p.com)) return false;
    return true;
  }).map(p => p.sec);

  fillSelect(secSelect, uniq(secCandidates), "toutes les sections");
}

function drawPoints(fit=true){
  const data = getFilteredPoints();
  cluster.clearLayers();

  const bounds = [];

  data.forEach(p => {
    const marker = L.marker([p.lat, p.lon]).bindPopup(p.popup || p.tip);

    if (forceLabels) {
      marker.bindTooltip(p.tip, {
        permanent: true,
        direction: "top",
        className: "lbl"
      });
    }

    cluster.addLayer(marker);
    bounds.push([p.lat, p.lon]);
  });

  countBox.textContent = data.length;

  if (fit && bounds.length) {
    map.fitBounds(bounds, {padding:[30,30]});
  }
}

async function loadSectionsLayer(){
  try{
    const res = await fetch("sections_communales.geojson");
    const gj = await res.json();

    sectionsLayer = L.geoJSON(gj, {
      style: {
        color: "#1C3D5A",
        weight: 1,
        opacity: 0.85,
        fill: false
      },
      onEachFeature: function(feature, layer){
        const nom =
          feature.properties?.section ||
          feature.properties?.nom ||
          feature.properties?.name ||
          "section communale";
        layer.bindTooltip(nom);
      }
    }).addTo(map);
  } catch(e){
    console.error("erreur sections communales", e);
  }
}

async function updatePreview(){
  try{
    const canvas = await html2canvas(document.getElementById("map"), {
      useCORS: true,
      allowTaint: false,
      scale: 1
    });
    printPreviewImg.src = canvas.toDataURL("image/jpeg", 0.9);
  } catch(e){
    console.error("aperçu impossible", e);
  }
}

function exportCsv(){
  const rows = [["departement","commune","section","nom_centre","latitude","longitude"]];
  getFilteredPoints().forEach(p => {
    rows.push([p.dep, p.com, p.sec, p.tip, p.lat, p.lon]);
  });

  const csv = rows.map(r =>
    r.map(v => `"${String(v ?? "").replace(/"/g,'""')}"`).join(",")
  ).join("\n");

  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "centres_filtres.csv";
  a.click();
  URL.revokeObjectURL(url);
}

async function printMap(){
  try{
    const canvas = await html2canvas(document.getElementById("map"), {
      useCORS: true,
      allowTaint: false,
      scale: 2
    });

    const img = canvas.toDataURL("image/jpeg", 0.95);

    const w = window.open("", "_blank");
    w.document.write(`
      <html>
      <head>
        <title>impression carte</title>
        <style>
          html,body{margin:0;padding:0;height:100%;font-family:Arial,sans-serif;}
          .title{
            position:absolute;top:12px;left:50%;transform:translateX(-50%);
            background:rgba(255,255,255,.95);padding:8px 14px;border:1px solid #ccc;border-radius:8px;
            font-weight:bold;
          }
          .mapimg{width:100%;height:100vh;object-fit:contain;}
          .legend{
            position:absolute;left:20px;bottom:20px;
            background:rgba(255,255,255,.95);padding:10px 12px;border:1px solid #ccc;border-radius:8px;
          }
          .north{
            position:absolute;top:20px;right:20px;background:rgba(255,255,255,.95);
            padding:8px;border:1px solid #ccc;border-radius:8px;text-align:center;width:52px;
          }
          .north .arrow{
            width:0;height:0;margin:4px auto 0;
            border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:28px solid black;
          }
          @page{size:landscape;margin:0;}
        </style>
      </head>
      <body>
        <div class="title">carte des centres de vote</div>
        <img class="mapimg" src="${img}">
        <div class="legend"><b>légende</b><br>● centres de vote<br>— sections communales</div>
        <div class="north"><b>N</b><div class="arrow"></div></div>
        <script>
          window.onload = function(){ window.print(); window.onafterprint = function(){ window.close(); }; };
        <\/script>
      </body>
      </html>
    `);
    w.document.close();
  } catch(e){
    console.error("erreur impression", e);
  }
}

resetBtn.addEventListener("click", () => {
  searchInput.value = "";
  depSelect.value = "__ALL__";
  refreshFilters();
  secSelect.value = "__ALL__";
  drawPoints(true);
});

fitBtn.addEventListener("click", () => drawPoints(true));

toggleSectionsBtn.addEventListener("click", () => {
  if (!sectionsLayer) return;
  if (sectionsVisible) {
    map.removeLayer(sectionsLayer);
    sectionsVisible = false;
  } else {
    map.addLayer(sectionsLayer);
    sectionsVisible = true;
  }
});

toggleLabelsBtn.addEventListener("click", () => {
  forceLabels = !forceLabels;
  drawPoints(false);
});

printBtn.addEventListener("click", printMap);
exportCsvBtn.addEventListener("click", exportCsv);

searchInput.addEventListener("input", () => drawPoints(true));

depSelect.addEventListener("change", () => {
  refreshFilters();
  drawPoints(true);
});

comSelect.addEventListener("change", () => {
  refreshFilters();
  drawPoints(true);
});

secSelect.addEventListener("change", () => drawPoints(true));

map.on("moveend", updatePreview);
map.on("zoomend", updatePreview);

fillSelect(depSelect, uniq(pts.map(p => p.dep)), "tous les départements");
refreshFilters();
drawPoints(true);
loadSectionsLayer();
setTimeout(updatePreview, 1200);
</script>
</body>
</html>
