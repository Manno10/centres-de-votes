<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="data.js"></script>

<script>
if (!Array.isArray(pts)) {
  alert("data.js ne s'est pas chargé correctement.");
  throw new Error("pts non chargé");
}

const map = L.map("map").setView([18.95, -72.83], 7);

const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19 });
const carto = L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", { maxZoom: 20 });
const esri = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", { maxZoom: 19 });

osm.addTo(map);

L.control.layers(
  { "OSM": osm, "Carto": carto, "Satellite": esri },
  {},
  { position: "bottomright", collapsed: false }
).addTo(map);

L.control.scale({ metric: true, imperial: false }).addTo(map);

const cluster = L.markerClusterGroup({
  chunkedLoading: true,
  chunkDelay: 50,
  chunkInterval: 200,
  disableClusteringAtZoom: 16
});
map.addLayer(cluster);

let sectionsLayer = null;
let sectionsOn = true;
let labelsOn = false;

const dep = document.getElementById("dep");
const com = document.getElementById("com");
const sec = document.getElementById("sec");
const search = document.getElementById("search");
const count = document.getElementById("count");
const preview = document.getElementById("preview");

function uniq(arr) {
  return [...new Set(arr.filter(v => v !== null && v !== undefined && String(v).trim() !== ""))]
    .sort((a, b) => String(a).localeCompare(String(b), "fr", { sensitivity: "base" }));
}

function norm(v) {
  return String(v || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .trim();
}

function getSelectedCommunes() {
  return Array.from(com.selectedOptions).map(o => o.value);
}

function fillSelect(selectEl, values, firstLabel = null) {
  selectEl.innerHTML = "";
  if (firstLabel !== null) {
    const opt = document.createElement("option");
    opt.value = "";
    opt.textContent = firstLabel;
    selectEl.appendChild(opt);
  }
  values.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    selectEl.appendChild(opt);
  });
}

function fillDepartments() {
  fillSelect(dep, uniq(pts.map(p => p.dep)), "tous");
}

function fillCommunes() {
  const depVal = dep.value;
  let data = pts;

  if (depVal) {
    data = data.filter(p => p.dep === depVal);
  }

  const communes = uniq(data.map(p => p.com));
  fillSelect(com, communes, null);
}

function fillSections() {
  const depVal = dep.value;
  const selectedComs = getSelectedCommunes();

  let data = pts;

  if (depVal) {
    data = data.filter(p => p.dep === depVal);
  }

  if (selectedComs.length) {
    data = data.filter(p => selectedComs.includes(p.com));
  }

  const sections = uniq(data.map(p => p.sec));
  fillSelect(sec, sections, "toutes");
}

function getFilteredPoints() {
  const depVal = dep.value;
  const secVal = sec.value;
  const comVals = getSelectedCommunes();
  const q = norm(search.value);

  return pts.filter(p => {
    if (depVal && p.dep !== depVal) return false;
    if (comVals.length && !comVals.includes(p.com)) return false;
    if (secVal && p.sec !== secVal) return false;

    if (q) {
      const txt = norm([p.tip, p.dep, p.com, p.sec, p.popup].join(" "));
      if (!txt.includes(q)) return false;
    }

    return true;
  });
}

function drawPoints(fit = true) {
  const data = getFilteredPoints();
  cluster.clearLayers();

  const bounds = [];

  data.forEach(p => {
    const marker = L.marker([p.lat, p.lon]).bindPopup(p.popup || p.tip);

    if (labelsOn) {
      marker.bindTooltip(p.tip, {
        permanent: true,
        direction: "top",
        className: "lbl"
      });
    }

    cluster.addLayer(marker);
    bounds.push([p.lat, p.lon]);
  });

  count.innerText = data.length;

  if (fit && bounds.length) {
    map.fitBounds(bounds, { padding: [30, 30] });
  }
}

async function previewUpdate() {
  try {
    const canvas = await html2canvas(document.getElementById("map"), {
      useCORS: true,
      allowTaint: false,
      scale: 1
    });
    preview.src = canvas.toDataURL("image/jpeg", 0.9);
  } catch (e) {
    console.error("aperçu impossible", e);
  }
}

async function printMap() {
  try {
    const canvas = await html2canvas(document.getElementById("map"), {
      useCORS: true,
      allowTaint: false,
      scale: 2
    });

    const img = canvas.toDataURL("image/jpeg", 0.95);

    const w = window.open("", "_blank");
    if (!w) return;

    w.document.write(`
      <html>
      <head>
        <title>impression carte</title>
        <style>
          html,body{margin:0;padding:0;height:100%;font-family:Arial,sans-serif;}
          .title{
            position:absolute;top:12px;left:50%;transform:translateX(-50%);
            background:rgba(255,255,255,.95);padding:8px 14px;border:1px solid #ccc;border-radius:8px;
            font-weight:bold;
          }
          .mapimg{width:100%;height:100vh;object-fit:contain;}
          .legend{
            position:absolute;left:20px;bottom:20px;
            background:rgba(255,255,255,.95);padding:10px 12px;border:1px solid #ccc;border-radius:8px;
          }
          .north{
            position:absolute;top:20px;right:20px;background:rgba(255,255,255,.95);
            padding:8px;border:1px solid #ccc;border-radius:8px;text-align:center;width:52px;
          }
          .north .arrow{
            width:0;height:0;margin:4px auto 0;
            border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:28px solid black;
          }
          @page{size:landscape;margin:0;}
        </style>
      </head>
      <body>
        <div class="title">carte des centres de vote</div>
        <img class="mapimg" src="${img}">
        <div class="legend"><b>légende</b><br>● centres<br>— sections communales</div>
        <div class="north"><b>N</b><div class="arrow"></div></div>
        <script>
          window.onload = function(){ window.print(); window.onafterprint = function(){ window.close(); }; };
        <\/script>
      </body>
      </html>
    `);
    w.document.close();
  } catch (e) {
    console.error("erreur impression", e);
  }
}

function exportCsv() {
  const data = getFilteredPoints();
  let rows = "dep,com,sec,nom,lat,lon\n";

  data.forEach(p => {
    rows += `"${String(p.dep).replace(/"/g,'""')}","${String(p.com).replace(/"/g,'""')}","${String(p.sec).replace(/"/g,'""')}","${String(p.tip).replace(/"/g,'""')}",${p.lat},${p.lon}\n`;
  });

  const blob = new Blob([rows], { type: "text/csv;charset=utf-8;" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "centres_filtres.csv";
  a.click();
  URL.revokeObjectURL(a.href);
}

async function loadSections() {
  try {
    const res = await fetch("sections_communales.geojson");
    const gj = await res.json();

    sectionsLayer = L.geoJSON(gj, {
      style: { color: "#1c3d5a", weight: 1, opacity: 0.9, fill: false },
      onEachFeature: function(feature, layer) {
        const nom =
          feature.properties?.section ||
          feature.properties?.nom ||
          feature.properties?.name ||
          "section communale";
        layer.bindTooltip(nom);
      }
    }).addTo(map);
  } catch (e) {
    console.error("erreur sections communales", e);
  }
}

document.getElementById("reset").onclick = () => {
  search.value = "";
  dep.value = "";
  fillCommunes();
  fillSections();
  sec.value = "";
  drawPoints(true);
};

document.getElementById("fit").onclick = () => drawPoints(true);

document.getElementById("labels").onclick = () => {
  labelsOn = !labelsOn;
  drawPoints(false);
};

document.getElementById("sections").onclick = () => {
  if (!sectionsLayer) return;
  if (sectionsOn) {
    map.removeLayer(sectionsLayer);
  } else {
    map.addLayer(sectionsLayer);
  }
  sectionsOn = !sectionsOn;
};

document.getElementById("print").onclick = printMap;
document.getElementById("csv").onclick = exportCsv;

search.oninput = () => drawPoints(true);

dep.onchange = () => {
  fillCommunes();
  fillSections();
  drawPoints(true);
};

com.onchange = () => {
  fillSections();
  drawPoints(true);
};

sec.onchange = () => drawPoints(true);

map.on("moveend", previewUpdate);
map.on("zoomend", previewUpdate);

// initialisation
fillDepartments();
fillCommunes();
fillSections();
drawPoints(true);
loadSections();
setTimeout(previewUpdate, 1000);
</script>
