<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Centres de vote — ELECTIONS 2026 Haïti</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { height: 100%; margin: 0; padding: 0; font-family: 'Source Sans 3', sans-serif; }
#map { height: 100%; width: 100%; background:#f3f4f6; }

:root{
  --panel-w: 340px;
  --panel-collapsed-w: 54px;
  --brand: #009FE3;
  --brand-dark: #1C3D5A;
  --ok: #198754;
  --warn: #b7791f;
  --line: #E5E7EB;
  --muted: #6B7280;
  --bg-soft: #F9FAFB;
}

.panel {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 9999;
  width: var(--panel-w);
  height: 100vh;
  background: #FFFFFF;
  display: flex;
  flex-direction: column;
  box-shadow: 4px 0 20px rgba(0,0,0,0.15);
  overflow: hidden;
  transition: width 0.25s ease, transform 0.25s ease;
}

.panel.collapsed {
  width: var(--panel-collapsed-w);
}

.panel.collapsed .panel-header-main,
.panel.collapsed .panel-body,
.panel.collapsed .panel-footer {
  display: none;
}

.panel-handle {
  position: absolute;
  top: 12px;
  right: 10px;
  z-index: 10000;
  width: 34px;
  height: 34px;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.16);
  color: white;
  cursor: pointer;
  font-size: 18px;
  font-weight: 700;
  line-height: 1;
  backdrop-filter: blur(3px);
}

.panel.collapsed .panel-mini {
  display: flex;
}

.panel-mini {
  display: none;
  height: 100%;
  width: 100%;
  background: var(--brand-dark);
  color: white;
  align-items: center;
  justify-content: center;
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  font-size: 12px;
  letter-spacing: 1px;
  font-weight: 700;
  text-transform: uppercase;
  user-select: none;
  cursor: pointer;
}

.panel-header {
  position: relative;
  background: var(--brand);
  padding: 16px 18px 14px;
  flex-shrink: 0;
}

.panel-header .logo-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.panel-header .logo-text {
  font-size: 15px;
  font-weight: 700;
  color: white;
  letter-spacing: 1.5px;
}

.panel-header .subtitle {
  font-size: 16px;
  font-weight: 700;
  color: white;
  line-height: 1.2;
  margin: 0;
}

.panel-header .subtitle small {
  font-size: 12px;
  font-weight: 400;
  opacity: 0.9;
  display: block;
  margin-top: 2px;
}

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 16px 0;
}

.filter-group {
  margin-bottom: 14px;
}

.filter-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--muted);
  margin-bottom: 5px;
  display: block;
}

.panel select {
  width: 100%;
  padding: 9px 10px;
  border: 1.5px solid #D1D5DB;
  border-radius: 6px;
  background: var(--bg-soft);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 13px;
  color: #111827;
  transition: border-color 0.2s, box-shadow 0.2s;
  cursor: pointer;
  appearance: auto;
}

.panel select:focus,
.panel input:focus {
  border-color: var(--brand);
  background: #fff;
  outline: none;
  box-shadow: 0 0 0 3px rgba(0,159,227,0.15);
}

#comSelect {
  height: 110px;
}

#searchInput {
  width: 100%;
  padding: 9px 10px;
  border: 1.5px solid #D1D5DB;
  border-radius: 6px;
  background: var(--bg-soft);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 13px;
  color: #111827;
}

#comBadges {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 6px;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: #EFF8FD;
  border: 1px solid #BAE0F5;
  border-radius: 20px;
  padding: 2px 8px 2px 9px;
  font-size: 11px;
  font-weight: 600;
  color: #0077B6;
}

.badge .x {
  cursor: pointer;
  font-weight: 700;
  color: #009FE3;
  font-size: 13px;
  line-height: 1;
}

.badge .x:hover {
  color: #E02020;
}

.panel-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--line);
  background: var(--bg-soft);
  flex-shrink: 0;
}

.footer-stats {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.stat-badge {
  background: var(--brand);
  color: white;
  border-radius: 20px;
  padding: 3px 12px;
  font-size: 20px;
  font-weight: 700;
  line-height: 1.4;
}

.stat-label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
}

.btn-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}

.btn-reset,
.btn-fit {
  width: 100%;
  padding: 9px;
  border-radius: 6px;
  border: none;
  color: white;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  font-family: 'Source Sans 3', sans-serif;
  transition: background 0.2s;
}

.btn-reset { background: var(--brand-dark); }
.btn-reset:hover { background: var(--brand); }

.btn-fit { background: #4B5563; }
.btn-fit:hover { background: #374151; }

.actions-box {
  margin-top: 10px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
}

.btn-action {
  width: 100%;
  padding: 9px 10px;
  border-radius: 6px;
  border: none;
  background: var(--brand);
  color: white;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  font-family: 'Source Sans 3', sans-serif;
  transition: background 0.2s;
}

.btn-action:hover { background: #0077B6; }
.btn-action.secondary { background: var(--brand-dark); }
.btn-action.secondary:hover { background: #163148; }
.btn-action.success { background: var(--ok); }
.btn-action.success:hover { background: #146c43; }
.btn-action.warning { background: var(--warn); }
.btn-action.warning:hover { background: #975a16; }

.toggle-row {
  display: flex;
  align-items: center;
  gap: 8px;
  background: white;
  border: 1px solid #D1D5DB;
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 13px;
  color: #374151;
  font-weight: 600;
}

.toggle-row input {
  transform: scale(1.1);
  accent-color: var(--brand);
}

.info-note {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.45;
  background: white;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 8px 10px;
}

.leaflet-tooltip.lbl {
  background: rgba(255,255,255,0.96);
  border: 1px solid rgba(0,0,0,0.15);
  border-radius: 5px;
  padding: 3px 7px;
  font-weight: 600;
  font-size: 11px;
  color: #111;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  font-family: 'Source Sans 3', sans-serif;
}

.map-legend {
  position: fixed;
  bottom: 24px;
  left: calc(var(--panel-w) + 14px);
  z-index: 9000;
  background: white;
  border-radius: 8px;
  padding: 10px 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 11px;
  border: 1px solid var(--line);
  min-width: 170px;
  transition: left 0.25s ease;
}

.map-legend.compact-left {
  left: calc(var(--panel-collapsed-w) + 14px);
}

.map-legend .legend-title {
  font-weight: 700;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--muted);
  margin-bottom: 7px;
}

.legend-row {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 4px;
  color: #374151;
}

.legend-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 2px solid rgba(0,0,0,0.2);
}

.capture-mode .leaflet-control-container,
.capture-mode .panel,
.capture-mode .map-legend {
  display: none !important;
}

@media (max-width: 768px) {
  :root{
    --panel-w: 290px;
  }
}
</style>
</head>
<body>

<div id="map"></div>

<div class="panel" id="panel">
  <div class="panel-mini" id="panelMini">filtres et export</div>

  <div class="panel-header">
    <button class="panel-handle" id="togglePanelBtn" title="minimiser / afficher">⟨</button>

    <div class="panel-header-main">
      <div class="logo-row">
        <div class="logo-text">ELECTIONS</div>
        <div style="width:1px;height:16px;background:rgba(255,255,255,0.4);"></div>
        <div style="font-size:11px;color:rgba(255,255,255,0.9);font-weight:500;">Haïti 2026</div>
      </div>
      <p class="subtitle">Centres de vote
        <small>visualisation, filtres et export</small>
      </p>
    </div>
  </div>

  <div class="panel-body">
    <div class="filter-group">
      <label class="filter-label">Recherche centre</label>
      <input type="text" id="searchInput" placeholder="nom du centre...">
    </div>

    <div class="filter-group">
      <label class="filter-label">Département</label>
      <select id="depSelect">
        <option value="__ALL__">Tous les départements</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label">
        Commune(s)
        <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:10px;color:#9CA3AF">
          — Ctrl+clic pour sélection multiple
        </span>
      </label>
      <select id="comSelect" multiple></select>
      <div id="comBadges"></div>
    </div>

    <div class="filter-group">
      <label class="filter-label">Section communale</label>
      <select id="secSelect">
        <option value="__ALL__">Toutes les sections</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label">Type d’export</label>
      <select id="exportModeSelect">
        <option value="filtered_csv">csv des centres filtrés</option>
        <option value="visible_csv">csv des centres visibles à l’écran</option>
        <option value="filtered_pdf">pdf des centres filtrés + carte</option>
      </select>
    </div>
  </div>

  <div class="panel-footer">
    <div class="footer-stats">
      <span class="stat-badge" id="countBox">0</span>
      <span class="stat-label">centres filtrés</span>
    </div>

    <div class="btn-row">
      <button class="btn-reset" id="resetBtn">réinitialiser</button>
      <button class="btn-fit" id="fitBtn">ajuster carte</button>
    </div>

    <div class="actions-box">
      <label class="toggle-row">
        <input type="checkbox" id="toggleLabels">
        afficher les labels des centres
      </label>

      <button class="btn-action success" id="runExportBtn">lancer l’export sélectionné</button>

      <button class="btn-action" id="exportCsvBtn">csv filtrés</button>
      <button class="btn-action warning" id="exportVisibleCsvBtn">csv visibles</button>
      <button class="btn-action secondary" id="exportPdfBtn">pdf avec carte</button>

      <div class="info-note">
        le pdf capture la carte visible. pour un rendu plus stable, utilise plutôt OpenStreetMap ou Carto light.
      </div>
    </div>
  </div>
</div>

<div class="map-legend" id="mapLegend">
  <div class="legend-title">Centres de vote</div>
  <div class="legend-row"><div class="legend-dot" style="background:#2E86C1;"></div> cluster</div>
  <div class="legend-row"><div class="legend-dot" style="background:#1C3D5A;"></div> centre individuel</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
// =========================================================
// garde ici ton bloc actuel const pts = [...]
// colle le bloc exact de ton fichier actuel à cet endroit
// =========================================================
const pts = [
{"lat": 19.4765055, "lon": -72.622297, "dep": "ARTIBONITE", "com": "GONAÏVES", "sec": "1re Pont Tamarin", "tip": "ECOLE NATIONALE DE SOUVENANCE", "popup": "<b>ECOLE NATIONALE DE SOUVENANCE<\/b><br>dep: ARTIBONITE<br>com: GONAÏVES<br>sec: 1re Pont Tamarin<br>responsable: =con<br>telephone: (+509) 3635-7119 / 4316-3112"},
{"lat": 19.421765, "lon": -72.6040528, "dep": "ARTIBONITE", "com": "GONAÏVES", "sec": "1re Pont Tamarin", "tip": "ECOLE NATIONAL DE MANDRIN", "popup": "<b>ECOLE NATIONAL DE MANDRIN<\/b><br>dep: ARTIBONITE<br>com: GONAÏVES<br>sec: 1re Pont Tamarin<br>telephone: (+509) 3535-9208"},
{"lat": 19.469007, "lon": -72.6651877, "dep": "ARTIBONITE", "com": "GONAÏVES", "sec": "1re Pont Tamarin", "tip": "ECOLE NATIONALE DE DERONVILLES", "popup": "<b>ECOLE NATIONALE DE DERONVILLES<\/b><br>dep: ARTIBONITE<br>com: GONAÏVES<br>sec: 1re Pont Tamarin<br>telephone: (+509) 3806-0798"},
...
];
// =========================================================
// carte
// =========================================================
const map = L.map('map', { zoomControl: false }).setView([18.955420883333332, -72.83014525030582], 7);
L.control.zoom({ position: 'bottomright' }).addTo(map);

const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  crossOrigin: true,
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

const carto = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 20,
  crossOrigin: true,
  attribution: '&copy; OpenStreetMap & Carto'
});

const esri = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19,
  crossOrigin: true,
  attribution: 'Esri'
});

L.control.layers(
  {
    "OpenStreetMap": osm,
    "Carto light": carto,
    "Satellite (Esri)": esri
  },
  null,
  { collapsed: false, position: 'topright' }
).addTo(map);

const iconDefault = L.icon({
  iconUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png",
  shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
  iconSize: [25, 41],
  iconAnchor: [12, 41],
  popupAnchor: [1, -34],
  shadowSize: [41, 41]
});

const cluster = L.markerClusterGroup({
  showCoverageOnHover: false,
  maxClusterRadius: 45,
  spiderfyOnMaxZoom: true,
  disableClusteringAtZoom: 16
});
map.addLayer(cluster);

// =========================================================
// références ui
// =========================================================
const panel = document.getElementById("panel");
const panelMini = document.getElementById("panelMini");
const togglePanelBtn = document.getElementById("togglePanelBtn");
const mapLegend = document.getElementById("mapLegend");

const searchInput = document.getElementById("searchInput");
const depSelect = document.getElementById("depSelect");
const comSelect = document.getElementById("comSelect");
const secSelect = document.getElementById("secSelect");
const exportModeSelect = document.getElementById("exportModeSelect");

const comBadges = document.getElementById("comBadges");
const countBox = document.getElementById("countBox");
const resetBtn = document.getElementById("resetBtn");
const fitBtn = document.getElementById("fitBtn");
const toggleLabels = document.getElementById("toggleLabels");

const runExportBtn = document.getElementById("runExportBtn");
const exportCsvBtn = document.getElementById("exportCsvBtn");
const exportVisibleCsvBtn = document.getElementById("exportVisibleCsvBtn");
const exportPdfBtn = document.getElementById("exportPdfBtn");

let forceLabels = false;

// =========================================================
// utilitaires
// =========================================================
function sel(v) {
  return v === "__ALL__" ? "" : v;
}

function uniqSorted(arr) {
  return [...new Set(arr.filter(Boolean))].sort((a, b) => a.localeCompare(b, 'fr', { sensitivity: 'base' }));
}

function normalizeText(v) {
  return String(v || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .trim();
}

function safeText(v) {
  return (v === null || v === undefined) ? "" : String(v);
}

function setOptions(selectEl, values, allLabel) {
  selectEl.innerHTML = "";
  if (allLabel) {
    const opt = document.createElement("option");
    opt.value = "__ALL__";
    opt.textContent = allLabel;
    selectEl.appendChild(opt);
  }
  values.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    selectEl.appendChild(opt);
  });
}

function setComOptions(values) {
  comSelect.innerHTML = "";
  values.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    comSelect.appendChild(opt);
  });
}

function selectedCommunes() {
  return Array.from(comSelect.selectedOptions).map(o => o.value);
}

function renderCommuneBadges() {
  const vals = selectedCommunes();
  comBadges.innerHTML = "";
  vals.forEach(v => {
    const span = document.createElement("span");
    span.className = "badge";
    span.innerHTML = `${v} <span class="x" data-val="${v}">&times;</span>`;
    comBadges.appendChild(span);
  });

  Array.from(comBadges.querySelectorAll(".x")).forEach(x => {
    x.addEventListener("click", function() {
      const val = this.getAttribute("data-val");
      Array.from(comSelect.options).forEach(o => {
        if (o.value === val) o.selected = false;
      });
      renderCommuneBadges();
      applyCascadeOptions();
      applyFilter(true);
    });
  });
}

function possibleCommunes(dep) {
  const subset = dep ? pts.filter(p => p.dep === dep) : pts;
  return uniqSorted(subset.map(p => p.com));
}

function possibleSections(dep, coms) {
  let s = pts;
  if (dep) s = s.filter(p => p.dep === dep);
  if (coms.length) s = s.filter(p => coms.includes(p.com));
  return uniqSorted(s.map(p => p.sec));
}

function applyCascadeOptions() {
  const dep = sel(depSelect.value);
  const coms = selectedCommunes();

  setComOptions(possibleCommunes(dep));

  const avail = new Set(possibleCommunes(dep));
  Array.from(comSelect.options).forEach(o => {
    o.selected = coms.includes(o.value) && avail.has(o.value);
  });

  setOptions(secSelect, possibleSections(dep, selectedCommunes()), "Toutes les sections");
  renderCommuneBadges();
}

function currentSearchTerm() {
  return normalizeText(searchInput.value);
}

function currentFilteredPoints() {
  const dep = sel(depSelect.value);
  const coms = selectedCommunes();
  const sec = sel(secSelect.value);
  const q = currentSearchTerm();

  return pts.filter(p => {
    const okGeo =
      (!dep || p.dep === dep) &&
      (!coms.length || coms.includes(p.com)) &&
      (!sec || p.sec === sec);

    if (!okGeo) return false;

    if (!q) return true;

    const hay = [
      p.tip,
      p.dep,
      p.com,
      p.sec,
      p.popup
    ].map(normalizeText).join(" | ");

    return hay.includes(q);
  });
}

function currentVisibleFilteredPoints() {
  const filtered = currentFilteredPoints();
  const bounds = map.getBounds();
  return filtered.filter(p => bounds.contains([p.lat, p.lon]));
}

function timestampForFile() {
  const d = new Date();
  const pad = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}-${pad(d.getMinutes())}-${pad(d.getSeconds())}`;
}

function currentFilterSummary() {
  return {
    dep: sel(depSelect.value) || "tous",
    coms: selectedCommunes().length ? selectedCommunes().join(" | ") : "toutes",
    sec: sel(secSelect.value) || "toutes",
    q: searchInput.value.trim() || "aucune"
  };
}

function mapInfoSummary() {
  const c = map.getCenter();
  return {
    zoom: map.getZoom(),
    centerLat: c.lat.toFixed(6),
    centerLon: c.lng.toFixed(6)
  };
}

function escapeCsv(value) {
  if (value === null || value === undefined) return "";
  const s = String(value).replace(/"/g, '""');
  return `"${s}"`;
}

// =========================================================
// panneau minimisable
// =========================================================
function updatePanelState() {
  const collapsed = panel.classList.contains("collapsed");
  togglePanelBtn.textContent = collapsed ? "⟩" : "⟨";
  mapLegend.classList.toggle("compact-left", collapsed);
  setTimeout(() => map.invalidateSize(), 260);
}

togglePanelBtn.addEventListener("click", () => {
  panel.classList.toggle("collapsed");
  updatePanelState();
});

panelMini.addEventListener("click", () => {
  panel.classList.remove("collapsed");
  updatePanelState();
});

// =========================================================
// affichage carte
// =========================================================
const LABEL_ZOOM = 14;
const MAX_LABELS = 250;

function applyFilter(fitMap = true) {
  const filtered = currentFilteredPoints();
  cluster.clearLayers();

  const bounds = [];
  const kept = filtered.length;
  countBox.textContent = kept.toLocaleString();

  const dep = sel(depSelect.value);
  const coms = selectedCommunes();
  const sec = sel(secSelect.value);
  const z = map.getZoom();

  const autoLabels =
    (sec && kept <= MAX_LABELS) ||
    ((z >= LABEL_ZOOM) && (coms.length || dep) && kept <= MAX_LABELS);

  const showLabels = forceLabels || autoLabels;

  for (const p of filtered) {
    const telMatch = p.popup && p.popup.match(/telephone[^<]*/i);
    const telText = telMatch ? telMatch[0] : "";

    const mk = L.marker([p.lat, p.lon], { icon: iconDefault }).bindPopup(
      `<div style="font-family:'Source Sans 3',sans-serif;min-width:220px;">
        <div style="background:#1C3D5A;color:white;padding:8px 10px;margin:-1px -1px 8px;border-radius:4px 4px 0 0;">
          <b style="font-size:13px;">${safeText(p.tip)}</b>
        </div>
        <div style="padding:0 2px;font-size:12px;line-height:1.7;color:#374151;">
          <b>Dép :</b> ${safeText(p.dep)}<br>
          <b>Commune :</b> ${safeText(p.com)}<br>
          <b>Section :</b> ${safeText(p.sec)}
        </div>
        ${telText ? `<div style="margin-top:6px;padding-top:6px;border-top:1px solid #E5E7EB;font-size:11px;color:#6B7280;">${telText}</div>` : ""}
      </div>`,
      { maxWidth: 300 }
    );

    if (showLabels) {
      mk.bindTooltip(safeText(p.tip), {
        permanent: true,
        direction: "top",
        offset: [0, -10],
        opacity: 0.95,
        className: "lbl"
      }).openTooltip();
    } else {
      mk.bindTooltip(safeText(p.tip));
    }

    cluster.addLayer(mk);
    bounds.push([p.lat, p.lon]);
  }

  if (fitMap && bounds.length > 0) {
    map.fitBounds(L.latLngBounds(bounds), { padding: [40, 40] });
  }
}

// =========================================================
// export csv
// =========================================================
function downloadCsv(rows, baseName) {
  const csv = rows.map(r => r.map(v => escapeCsv(v)).join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = `${baseName}_${timestampForFile()}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function buildRowsForPoints(points, modeLabel) {
  const fs = currentFilterSummary();
  const ms = mapInfoSummary();

  const rows = [];
  rows.push(["type_export", modeLabel]);
  rows.push(["date_export", new Date().toLocaleString()]);
  rows.push(["recherche", fs.q]);
  rows.push(["departement_filtre", fs.dep]);
  rows.push(["communes_filtrees", fs.coms]);
  rows.push(["section_filtree", fs.sec]);
  rows.push(["zoom_carte", ms.zoom]);
  rows.push(["centre_carte_lat", ms.centerLat]);
  rows.push(["centre_carte_lon", ms.centerLon]);
  rows.push(["nombre_centres", points.length]);
  rows.push([]);
  rows.push(["departement", "commune", "section", "nom_centre", "latitude", "longitude"]);

  points.forEach(p => {
    rows.push([p.dep, p.com, p.sec, p.tip, p.lat, p.lon]);
  });

  return rows;
}

function exportFilteredCsv() {
  const filtered = currentFilteredPoints();
  if (!filtered.length) {
    alert("aucun centre à exporter.");
    return;
  }
  downloadCsv(buildRowsForPoints(filtered, "filtres"), "centres_filtres");
}

function exportVisibleCsv() {
  const visible = currentVisibleFilteredPoints();
  if (!visible.length) {
    alert("aucun centre visible à exporter.");
    return;
  }
  downloadCsv(buildRowsForPoints(visible, "visibles_ecran"), "centres_visibles");
}

// =========================================================
// capture carte
// =========================================================
async function captureMapImage() {
  const mapEl = document.getElementById("map");

  document.body.classList.add("capture-mode");
  await new Promise(r => setTimeout(r, 500));

  try {
    const canvas = await html2canvas(mapEl, {
      useCORS: true,
      allowTaint: false,
      logging: false,
      backgroundColor: "#ffffff",
      scale: 1.5
    });
    return canvas.toDataURL("image/jpeg", 0.92);
  } finally {
    document.body.classList.remove("capture-mode");
  }
}

// =========================================================
// export pdf
// =========================================================
async function exportFilteredPdf() {
  const filtered = currentFilteredPoints();
  if (!filtered.length) {
    alert("aucun centre à exporter.");
    return;
  }

  exportPdfBtn.disabled = true;
  runExportBtn.disabled = true;
  exportPdfBtn.textContent = "génération...";
  runExportBtn.textContent = "génération...";

  try {
    const fs = currentFilterSummary();
    const ms = mapInfoSummary();
    const visible = currentVisibleFilteredPoints();

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF("p", "mm", "a4");

    doc.setFont("helvetica", "bold");
    doc.setFontSize(15);
    doc.text("export des centres de vote filtrés", 14, 15);

    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.text(`date d'export : ${new Date().toLocaleString()}`, 14, 23);
    doc.text(`recherche : ${fs.q}`, 14, 29);
    doc.text(`département : ${fs.dep}`, 14, 35);
    doc.text(`commune(s) : ${fs.coms}`, 14, 41);
    doc.text(`section : ${fs.sec}`, 14, 47);
    doc.text(`centres filtrés : ${filtered.length}`, 14, 53);
    doc.text(`centres visibles à l'écran : ${visible.length}`, 14, 59);
    doc.text(`zoom : ${ms.zoom}`, 14, 65);
    doc.text(`centre carte : ${ms.centerLat}, ${ms.centerLon}`, 14, 71);

    let imgAdded = false;
    try {
      const imgData = await captureMapImage();
      doc.setFont("helvetica", "bold");
      doc.setFontSize(11);
      doc.text("carte visible", 14, 81);
      doc.addImage(imgData, "JPEG", 14, 85, 182, 92);
      imgAdded = true;
    } catch (err) {
      doc.setFont("helvetica", "italic");
      doc.setFontSize(9);
      doc.text("capture de carte non disponible avec le fond courant.", 14, 84);
    }

    const startY = imgAdded ? 184 : 92;
    const body = filtered.map((p, i) => [
      i + 1,
      safeText(p.dep),
      safeText(p.com),
      safeText(p.sec),
      safeText(p.tip),
      p.lat,
      p.lon
    ]);

    doc.autoTable({
      startY: startY,
      head: [["#", "département", "commune", "section", "centre", "lat", "lon"]],
      body: body,
      styles: {
        fontSize: 7.6,
        cellPadding: 1.8,
        overflow: "linebreak"
      },
      headStyles: {
        fillColor: [28, 61, 90]
      },
      columnStyles: {
        0: { cellWidth: 7 },
        1: { cellWidth: 24 },
        2: { cellWidth: 28 },
        3: { cellWidth: 28 },
        4: { cellWidth: 67 },
        5: { cellWidth: 18 },
        6: { cellWidth: 18 }
      },
      margin: { left: 10, right: 10 }
    });

    doc.save(`centres_filtres_${timestampForFile()}.pdf`);
  } catch (e) {
    console.error(e);
    alert("erreur lors de la génération du pdf.");
  } finally {
    exportPdfBtn.disabled = false;
    runExportBtn.disabled = false;
    exportPdfBtn.textContent = "pdf avec carte";
    runExportBtn.textContent = "lancer l’export sélectionné";
  }
}

// =========================================================
// boutons utilitaires
// =========================================================
function fitCurrentFiltered() {
  const filtered = currentFilteredPoints();
  if (!filtered.length) {
    alert("aucun centre à afficher.");
    return;
  }
  const bounds = L.latLngBounds(filtered.map(p => [p.lat, p.lon]));
  map.fitBounds(bounds, { padding: [40, 40] });
}

function runSelectedExport() {
  const mode = exportModeSelect.value;
  if (mode === "filtered_csv") {
    exportFilteredCsv();
  } else if (mode === "visible_csv") {
    exportVisibleCsv();
  } else if (mode === "filtered_pdf") {
    exportFilteredPdf();
  }
}

// =========================================================
// reset
// =========================================================
function resetAll() {
  searchInput.value = "";
  depSelect.value = "__ALL__";
  setComOptions(possibleCommunes(""));
  Array.from(comSelect.options).forEach(o => o.selected = false);
  setOptions(secSelect, possibleSections("", []), "Toutes les sections");
  secSelect.value = "__ALL__";
  forceLabels = false;
  toggleLabels.checked = false;
  renderCommuneBadges();
  applyFilter(true);
}

// =========================================================
// initialisation
// =========================================================
setOptions(depSelect, uniqSorted(pts.map(p => p.dep)), "Tous les départements");
setComOptions(possibleCommunes(""));
setOptions(secSelect, possibleSections("", []), "Toutes les sections");

depSelect.addEventListener("change", () => {
  applyCascadeOptions();
  applyFilter(true);
});

comSelect.addEventListener("change", () => {
  renderCommuneBadges();
  setOptions(secSelect, possibleSections(sel(depSelect.value), selectedCommunes()), "Toutes les sections");
  applyFilter(true);
});

secSelect.addEventListener("change", () => {
  applyFilter(true);
});

searchInput.addEventListener("input", () => {
  applyFilter(true);
});

resetBtn.addEventListener("click", resetAll);
fitBtn.addEventListener("click", fitCurrentFiltered);

toggleLabels.addEventListener("change", function() {
  forceLabels = this.checked;
  applyFilter(false);
});

runExportBtn.addEventListener("click", runSelectedExport);
exportCsvBtn.addEventListener("click", exportFilteredCsv);
exportVisibleCsvBtn.addEventListener("click", exportVisibleCsv);
exportPdfBtn.addEventListener("click", exportFilteredPdf);

map.on("zoomend", () => {
  if (!forceLabels) applyFilter(false);
});

updatePanelState();
applyFilter(true);
</script>
